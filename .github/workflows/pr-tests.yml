name: PR Tests

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend)
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: annotated-maps-backend:scan
          cache-from: |
            type=gha,scope=backend-compile
            type=gha,scope=backend

      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: annotated-maps-backend:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@v3.88.30
        with:
          extra_args: --only-verified

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compile backend (builder stage only)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          target: builder
          push: false
          load: false
          cache-from: type=gha,scope=backend-compile
          cache-to: type=gha,scope=backend-compile,mode=max

  test:
    needs: [lint, compile]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build backend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: annotated-maps-backend:latest
          cache-from: |
            type=gha,scope=backend-compile
            type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.dev
          load: true
          tags: annotated-maps-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for MySQL to be healthy
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T mysql mysqladmin ping -uroot -prootpassword 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 12); do
            if curl -s --max-time 5 -o /dev/null http://localhost:8080/api/v1/../ 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Run database tests
        run: python3 database/tests/run-db-tests.py

      - name: Run backend tests (fast tier)
        run: python3 backend/tests/run-tests.py --tier fast
        env:
          CURL_TIMEOUT: "30"

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs --tail 50 backend

      - name: Stop stack
        if: always()
        run: docker compose down -v
