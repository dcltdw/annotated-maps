name: PR Tests

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend)
        run: npm audit --audit-level=critical
        working-directory: frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: annotated-maps-backend:scan
          cache-from: |
            type=gha,scope=backend-compile
            type=gha,scope=backend

      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: annotated-maps-backend:scan
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          extra_args: --only-verified

  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compile backend (builder stage only)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          target: builder
          push: false
          load: false
          cache-from: type=gha,scope=backend-compile
          cache-to: type=gha,scope=backend-compile,mode=max

  test:
    needs: [lint, compile]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build backend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: annotated-maps-backend:latest
          cache-from: |
            type=gha,scope=backend-compile
            type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.dev
          load: true
          tags: annotated-maps-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for MySQL to be healthy
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T mysql mysqladmin ping -uroot -prootpassword 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 12); do
            if curl -s --max-time 5 -o /dev/null http://localhost:8080/api/v1/../ 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Run database tests
        id: db_tests
        run: |
          python3 database/tests/run-db-tests.py 2>&1 | tee /tmp/db-tests.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run backend tests (fast tier)
        id: backend_tests
        if: always() && steps.db_tests.outcome != 'skipped'
        run: |
          python3 backend/tests/run-tests.py --tier fast 2>&1 | tee /tmp/backend-tests.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          CURL_TIMEOUT: "30"

      - name: Post test summary to PR
        if: always() && steps.db_tests.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function parseCounts(log) {
              let passed = 0, failed = 0;
              for (const line of log.split('\n')) {
                const m = line.match(/(\d+)\s+passed,\s+(\d+)\s+failed/);
                if (m) {
                  passed += parseInt(m[1]);
                  failed += parseInt(m[2]);
                }
              }
              return { passed, failed };
            }

            let dbLog = '', backendLog = '';
            try { dbLog = fs.readFileSync('/tmp/db-tests.log', 'utf8'); } catch {}
            try { backendLog = fs.readFileSync('/tmp/backend-tests.log', 'utf8'); } catch {}

            const db = parseCounts(dbLog);
            const backend = parseCounts(backendLog);
            const total = { passed: db.passed + backend.passed, failed: db.failed + backend.failed };
            const status = total.failed > 0 ? '❌' : '✅';
            const logsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Extract failed test names
            const failures = [];
            for (const line of (dbLog + '\n' + backendLog).split('\n')) {
              if (line.trim().startsWith('FAIL:')) {
                failures.push(line.trim());
              }
            }

            let body = `## ${status} Test Results\n\n`;
            body += `| Suite | Passed | Failed |\n`;
            body += `|-------|-------:|-------:|\n`;
            body += `| Database | ${db.passed} | ${db.failed} |\n`;
            body += `| Backend (fast) | ${backend.passed} | ${backend.failed} |\n`;
            body += `| **Total** | **${total.passed}** | **${total.failed}** |\n\n`;

            if (failures.length > 0) {
              body += `### Failures\n\n`;
              body += '```\n' + failures.join('\n') + '\n```\n\n';
            }

            body += `[Full logs](${logsUrl})`;

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## ✅ Test Results';
            const markerFail = '## ❌ Test Results';
            const existing = comments.find(c =>
              c.body?.startsWith(marker) || c.body?.startsWith(markerFail)
            );

            // On success with no existing comment: skip posting so the PR
            // author doesn't get a PR-comment email for every green run.
            // On failure OR when updating an existing comment (edits don't
            // trigger email notifications), post/update as usual.
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else if (total.failed > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: always() && steps.db_tests.outcome != 'skipped'
        run: |
          db_exit="${{ steps.db_tests.outputs.exit_code }}"
          backend_exit="${{ steps.backend_tests.outputs.exit_code }}"
          if [ "$db_exit" != "0" ] || [ "$backend_exit" != "0" ]; then
            echo "Tests failed (db=$db_exit, backend=$backend_exit)"
            exit 1
          fi

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs --tail 50 backend

      - name: Stop stack
        if: always()
        run: docker compose down -v
