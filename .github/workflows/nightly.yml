name: Nightly Tests

on:
  schedule:
    - cron: '0 3 * * 1-5'  # weekdays 3am UTC
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build backend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          tags: annotated-maps-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.dev
          load: true
          tags: annotated-maps-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # Install frontend deps on the runner BEFORE starting the stack so
      # frontend/node_modules exists owned by `runner`. The frontend
      # container bind-mounts ./frontend:/app with an anonymous volume on
      # /app/node_modules to shadow the host dir; without pre-creating the
      # dir as `runner`, Docker creates it as root and the runner's later
      # npm ci EACCES'es. Same fix as pr-tests.yml.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for MySQL to be healthy
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T mysql mysqladmin ping -uroot -prootpassword 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 12); do
            if curl -s --max-time 5 -o /dev/null http://localhost:8080/api/v1/../ 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Run database tests
        run: python3 database/tests/run-db-tests.py

      - name: Run backend tests (nightly tier)
        run: python3 backend/tests/run-tests.py --tier nightly
        env:
          CURL_TIMEOUT: "30"

      # ── E2E (Playwright) ────────────────────────────────────────────────────
      # Runs the full E2E suite. Chromium is reinstalled each run (~30s);
      # we don't cache ~/.cache/ms-playwright — the cache is workflow-trigger
      # scoped and on first MISS the upload can stall at ~75% indefinitely
      # (see pr-tests.yml comment for the full story).
      - name: Install Playwright + system deps
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 18); do
            if curl -sf -o /dev/null http://localhost:5173 2>/dev/null; then
              echo "Frontend is ready"
              break
            fi
            echo "  attempt $i..."
            sleep 5
          done

      - name: Run E2E tests (Playwright)
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs --tail 50 backend

      - name: Stop stack
        if: always()
        run: docker compose down -v
