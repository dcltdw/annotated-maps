version: "3.9"

# ─── Local development stack ───────────────────────────────────────────────────
#
# Services:
#   mysql     — database (port 3306, data persisted in Docker volume)
#   backend   — C++ Drogon REST API (port 8080)
#   frontend  — Vite dev server with HMR (port 5173)
#
# Quick start:
#   docker compose up --build
#
# Then visit http://localhost:5173

services:

  # ── MySQL ───────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: annotated_maps
      MYSQL_USER: annmaps_user
      MYSQL_PASSWORD: annmaps_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-run migrations on first start
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── C++ Backend (Drogon) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config.docker.json:/app/config.json:ro
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - TZ=UTC

  # ── React Frontend (Vite dev server) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules      # anonymous volume to prevent host override
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
